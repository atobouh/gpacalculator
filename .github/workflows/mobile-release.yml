name: Mobile Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dart/flutter_gpa_calculator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Collect Android artifact
        run: |
          mkdir -p "$GITHUB_WORKSPACE/release-assets"
          cp build/app/outputs/flutter-apk/app-release.apk "$GITHUB_WORKSPACE/release-assets/gpa-calculator-android-${{ github.ref_name }}.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: release-assets/*.apk

  build-ios:
    name: Build iOS Archive (Unsigned)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: dart/flutter_gpa_calculator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package iOS artifact
        run: |
          mkdir -p "$GITHUB_WORKSPACE/release-assets"
          cd build/ios/iphoneos
          ditto -c -k --sequesterRsrc --keepParent Runner.app "$GITHUB_WORKSPACE/release-assets/gpa-calculator-ios-${{ github.ref_name }}-unsigned.zip"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: release-assets/*.zip

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-android
      - build-ios
    runs-on: ubuntu-latest

    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: release-assets

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-release
          path: release-assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GPA Calculator ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            First mobile release generated by GitHub Actions.

            Assets:
            - Android: release APK
            - iOS: unsigned Runner.app zip (for signed IPA, add Apple signing credentials)
          files: |
            release-assets/*.apk
            release-assets/*.zip
